<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Management</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 30px;
      color: #333;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .header-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    button {
      padding: 8px 20px;
      background: #222;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 14px;
      border-radius: 3px;
    }

    button:hover { background: #444; }

    table {
      width: 600px;
      border-collapse: collapse;
      background: #fff;
      font-size: 14px;
    }

    thead tr {
      background: #222;
      color: #fff;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    tbody tr:hover { background: #f9f9f9; }

    .actions button {
      padding: 4px 10px;
      margin-right: 5px;
      font-size: 12px;
    }

    .btn-edit { background: #1976d2; }
    .btn-edit:hover { background: #1565c0; }
    .btn-delete { background: #c62828; }
    .btn-delete:hover { background: #b71c1c; }
    .btn-comp { background: #2e7d32; }
    .btn-comp:hover { background: #1b5e20; }

    /* Loading spinner overlay */
    #loader {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    #loader.active { display: flex; }

    .spinner {
      width: 50px; height: 50px;
      border: 5px solid #ccc;
      border-top-color: #222;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.active { display: flex; }

    .modal {
      background: #fff;
      padding: 28px 32px;
      width: 420px;
      border-radius: 4px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }

    .modal h3 { margin-bottom: 18px; font-size: 18px; }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-cancel { background: #777; }
    .btn-cancel:hover { background: #555; }

    /* Compensation box */
    #compBox {
      display: none;
      margin-top: 20px;
      padding: 14px 18px;
      background: #e8f5e9;
      border-left: 4px solid #2e7d32;
      width: 600px;
      font-size: 14px;
    }

    #compBox p { margin: 4px 0; }

    .msg { margin-top: 10px; font-size: 13px; color: green; }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader"><div class="spinner"></div></div>

  <!-- Add / Edit Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h3 id="modalTitle">Add Employee</h3>
      <input type="hidden" id="empId"/>
      <div class="form-group"><label>Name</label><input type="text" id="empName" placeholder="Name"/></div>
      <div class="form-group"><label>Age</label><input type="number" id="empAge" placeholder="Age"/></div>
      <div class="form-group"><label>Mobile</label><input type="text" id="empMobile" placeholder="Mobile"/></div>
      <div class="form-group"><label>City</label><input type="text" id="empCity" placeholder="City"/></div>
      <div class="form-group"><label>Department</label><input type="text" id="empDept" placeholder="Department"/></div>
      <div class="form-group"><label>Salary</label><input type="number" id="empSalary" placeholder="Salary"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button onclick="saveEmployee()">Save</button>
      </div>
    </div>
  </div>

  <h2>Employee Information:</h2>

  <div class="header-row">
    <button onclick="openAddModal()">Add</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Mobile</th>
        <th>City</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="empTableBody">
      <tr><td colspan="5" style="text-align:center; padding:20px;">Loading...</td></tr>
    </tbody>
  </table>

  <div id="compBox">
    <strong>Compensation Details</strong>
    <p id="compName"></p>
    <p id="compDept"></p>
    <p id="compSalary"></p>
  </div>

  <script>
    const BASE = '/api/employees';

    function showLoader() { document.getElementById('loader').classList.add('active'); }
    function hideLoader() { document.getElementById('loader').classList.remove('active'); }

    // ── FETCH ALL EMPLOYEES ──
    async function loadEmployees() {
      showLoader();
      try {
        const res = await fetch(BASE);
        const employees = await res.json();
        renderTable(employees);
      } catch (e) {
        console.error(e);
      } finally {
        hideLoader();
      }
    }

    function renderTable(employees) {
      const tbody = document.getElementById('empTableBody');
      if (!employees.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">No employees found.</td></tr>';
        return;
      }
      tbody.innerHTML = employees.map(emp => `
        <tr>
          <td>${emp.name}</td>
          <td>${emp.age}</td>
          <td>${emp.mobile}</td>
          <td>${emp.city}</td>
          <td class="actions">
            <button class="btn-edit" onclick="openEditModal(${emp.id})">Edit</button>
            <button class="btn-delete" onclick="deleteEmployee(${emp.id})">Delete</button>
            <button class="btn-comp" onclick="getCompensation(${emp.id})">Comp</button>
          </td>
        </tr>
      `).join('');
    }

    // ── ADD MODAL ──
    function openAddModal() {
      document.getElementById('modalTitle').textContent = 'Add Employee';
      document.getElementById('empId').value = '';
      ['empName','empAge','empMobile','empCity','empDept','empSalary'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('modalBackdrop').classList.add('active');
    }

    // ── EDIT MODAL ──
    async function openEditModal(id) {
      showLoader();
      try {
        const res = await fetch(`${BASE}/${id}`);
        const emp = await res.json();
        document.getElementById('modalTitle').textContent = 'Edit Employee';
        document.getElementById('empId').value = emp.id;
        document.getElementById('empName').value = emp.name;
        document.getElementById('empAge').value = emp.age;
        document.getElementById('empMobile').value = emp.mobile;
        document.getElementById('empCity').value = emp.city;
        document.getElementById('empDept').value = emp.department;
        document.getElementById('empSalary').value = emp.salary;
        document.getElementById('modalBackdrop').classList.add('active');
      } catch(e) {
        console.error(e);
      } finally {
        hideLoader();
      }
    }

    function closeModal() {
      document.getElementById('modalBackdrop').classList.remove('active');
    }

    // ── SAVE (ADD or UPDATE) ──
    async function saveEmployee() {
      const id = document.getElementById('empId').value;
      const payload = {
        name:       document.getElementById('empName').value,
        age:        document.getElementById('empAge').value,
        mobile:     document.getElementById('empMobile').value,
        city:       document.getElementById('empCity').value,
        department: document.getElementById('empDept').value,
        salary:     document.getElementById('empSalary').value
      };

      showLoader();
      try {
        let res;
        if (id) {
          // UPDATE
          res = await fetch(`${BASE}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } else {
          // ADD
          res = await fetch(BASE, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }
        await res.json();
        closeModal();
        await loadEmployees();
      } catch(e) {
        console.error(e);
      } finally {
        hideLoader();
      }
    }

    // ── DELETE ──
    async function deleteEmployee(id) {
      if (!confirm('Delete this employee?')) return;
      showLoader();
      try {
        await fetch(`${BASE}/${id}`, { method: 'DELETE' });
        await loadEmployees();
      } catch(e) {
        console.error(e);
      } finally {
        hideLoader();
      }
    }

    // ── GET COMPENSATION ──
    async function getCompensation(id) {
      showLoader();
      try {
        const res = await fetch(`${BASE}/compensation/${id}`);
        const data = await res.json();
        const box = document.getElementById('compBox');
        document.getElementById('compName').textContent    = `Employee: ${data.name}`;
        document.getElementById('compDept').textContent    = `Department: ${data.department}`;
        document.getElementById('compSalary').textContent  = `Salary: ₹${data.salary}`;
        box.style.display = 'block';
      } catch(e) {
        console.error(e);
      } finally {
        hideLoader();
      }
    }

    // Init
    loadEmployees();
  </script>
</body>
</html>
